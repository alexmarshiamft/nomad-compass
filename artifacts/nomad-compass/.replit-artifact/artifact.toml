kind = "web"
previewPath = "/"
title = "Nomad Compass"
version = "1.0.0"
id = "artifacts/nomad-compass"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20740

[services.development]
run = "pnpm --filter @workspace/nomad-compass run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nomad-compass", "run", "build" ]
publicDir = "artifacts/nomad-compass/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20740"
BASE_PATH = "/"
