[build]
  command = "export NETLIFY=true && pnpm install && pnpm --filter ./artifacts/api-server run build && pnpm --filter ./artifacts/nomad-compass run build"
  publish = "artifacts/nomad-compass/dist/public"
  functions = "artifacts/api-server/dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
